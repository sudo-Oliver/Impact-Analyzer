name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package tarball
        run: |
          tar -czf eia-${{ github.ref_name }}-${{ matrix.target }}.tar.gz \
            -C target/${{ matrix.target }}/release eia

      - uses: actions/upload-artifact@v4
        with:
          name: eia-${{ matrix.target }}
          path: eia-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    outputs:
      sha_aarch64:    ${{ steps.sha.outputs.sha_aarch64 }}
      sha_x86_darwin: ${{ steps.sha.outputs.sha_x86_darwin }}
      sha_x86_linux:  ${{ steps.sha.outputs.sha_x86_linux }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Compute SHA256
        id: sha
        run: |
          echo "sha_aarch64=$(sha256sum eia-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "sha_x86_darwin=$(sha256sum eia-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "sha_x86_linux=$(sha256sum eia-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: eia-*.tar.gz
          generate_release_notes: true

  update-formula:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          repository: sudo-Oliver/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
          ref: main

      - name: Render formula from template
        env:
          VERSION:        ${{ github.ref_name }}
          SHA_AARCH64:    ${{ needs.release.outputs.sha_aarch64 }}
          SHA_X86_DARWIN: ${{ needs.release.outputs.sha_x86_darwin }}
          SHA_X86_LINUX:  ${{ needs.release.outputs.sha_x86_linux }}
        run: |
          VERSION_NO_V="${VERSION#v}"
          BASE="https://github.com/sudo-Oliver/Impact-Analyzer/releases/download/${VERSION}"

          sed \
            -e "s|VERSION_PLACEHOLDER|${VERSION_NO_V}|g" \
            -e "s|URL_AARCH64|${BASE}/eia-${VERSION}-aarch64-apple-darwin.tar.gz|g" \
            -e "s|SHA_AARCH64|${SHA_AARCH64}|g" \
            -e "s|URL_X86_DARWIN|${BASE}/eia-${VERSION}-x86_64-apple-darwin.tar.gz|g" \
            -e "s|SHA_X86_DARWIN|${SHA_X86_DARWIN}|g" \
            -e "s|URL_X86_LINUX|${BASE}/eia-${VERSION}-x86_64-unknown-linux-gnu.tar.gz|g" \
            -e "s|SHA_X86_LINUX|${SHA_X86_LINUX}|g" \
            .github/homebrew/formula.rb.template \
            > homebrew-tap/Formula/eia.rb

      - name: Commit and push updated formula
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/eia.rb
          git diff --staged --quiet || git commit -m "eia ${{ github.ref_name }}"
          git push
